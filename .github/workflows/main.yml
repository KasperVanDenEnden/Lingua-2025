# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy a Node.js app and an Angular app to an Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build lingua (frontend)
        run: npx nx build lingua --configuration=production

      - name: Build data-api
        run: npx nx build data-api --configuration=production

      - name: Build rcmnd-api
        run: npx nx build rcmnd-api --configuration=production

      - name: Zip artifacts
        run: |
          cd ${{ github.workspace }}/dist/apps/lingua/browser && zip ${{ github.workspace }}/lingua-release.zip ./* -r
          cd ${{ github.workspace }}/dist/apps/data-api && zip ${{ github.workspace }}/data-api-release.zip ./* -r
          cd ${{ github.workspace }}/dist/apps/rcmnd-api && zip ${{ github.workspace }}/rcmnd-api-release.zip ./* -r

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: lingua
          path: lingua-release.zip

      - name: Upload data-api artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-api
          path: data-api-release.zip

      - name: Upload rcmnd-api artifact
        uses: actions/upload-artifact@v4
        with:
          name: rcmnd-api
          path: rcmnd-api-release.zip

  deploy-lingua:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lingua

      - name: Unzip artifact
        run: unzip lingua-release.zip -d lingua  # ← unzip naar submap

      - name: Deploy to static azure web app
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.ANGULAR_PUBLISHTOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "lingua"       # ← verwijst naar submap
          output_location: ""
          skip_app_build: true

  deploy-data-api:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: data-api

      - name: Unzip artifact
        run: unzip data-api-release.zip -d data-api  # ← unzip naar submap

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'nestjs'
          slot-name: 'c9cxd8gzbyb7ajhr'

          publish-profile: ${{ secrets.NESTJS_PUBLISHPROFILE }}
          package: data-api            # ← verwijst naar submap

  deploy-rcmnd-api:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rcmnd-api

      - name: Unzip artifact
        run: unzip rcmnd-api-release.zip -d rcmnd-api  # ← unzip naar submap

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'rcmnd-api'
          slot-name: 'g4dxdkcqd4fsaghr'
          publish-profile: ${{ secrets.RCMND_PUBLISHPROFILE }}
          package: rcmnd-api           # ← verwijst naar submap


