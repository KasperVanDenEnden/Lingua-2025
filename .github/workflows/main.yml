name: Build and deploy Node.js apps and Angular app to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build lingua (frontend)
        run: npx nx build lingua --configuration=production

      - name: Build data-api
        run: npx nx build data-api --configuration=production

      - name: Build rcmnd-api
        run: npx nx build rcmnd-api --configuration=production

      - name: Zip artifacts
        run: |
          cd ${{ github.workspace }}/dist/apps/lingua && zip ${{ github.workspace }}/frontend-app-release.zip ./* -r
          cd ${{ github.workspace }}/dist/apps/data-api && zip ${{ github.workspace }}/data-api-release.zip ./* -r
          cd ${{ github.workspace }}/dist/apps/rcmnd-api && zip ${{ github.workspace }}/rcmnd-api-release.zip ./* -r

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-app
          path: frontend-app-release.zip

      - name: Upload data-api artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-api
          path: data-api-release.zip

      - name: Upload rcmnd-api artifact
        uses: actions/upload-artifact@v4
        with:
          name: rcmnd-api
          path: rcmnd-api-release.zip

  deploy-frontend-app:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-app

      - name: Unzip artifact
        run: unzip frontend-app-release.zip -d frontend-app

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.ANGULAR_PUBLISHTOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend-app"
          output_location: ""

  deploy-data-api:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: data-api

      - name: Unzip artifact
        run: unzip data-api-release.zip -d data-api

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'NxWorkshop'
          slot-name: 'Production'
          publish-profile: ${{ secrets.NEXTJS_PUBLISHPROFILE }}
          package: data-api

  deploy-rcmnd-api:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: rcmnd-api

      - name: Unzip artifact
        run: unzip rcmnd-api-release.zip -d rcmnd-api

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'NxWorkshop'
          slot-name: 'Production'
          publish-profile: ${{ secrets.RCMND_PUBLISHPROFILE }}
          package: rcmnd-api